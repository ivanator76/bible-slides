<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聖經經文投影片產生器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#3a2d55;border-radius:3px}
body{min-height:100vh;background:linear-gradient(170deg,#0a0a12 0%,#12101f 40%,#1a1028 100%);color:#e8e0f0;font-family:'Noto Serif TC',Georgia,serif;overflow-y:auto}
.header{text-align:center;padding:32px 20px 14px}
.header .sub{font-size:12px;letter-spacing:7px;color:#C9A96E;margin-bottom:8px;font-weight:600}
.header h1{font-size:clamp(26px,5vw,40px);font-weight:900;background:linear-gradient(135deg,#e8e0f0 0%,#C9A96E 50%,#e8e0f0 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite;line-height:1.3}
.header p{color:#6a5f80;font-size:13px;margin-top:6px}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
.container{max-width:780px;margin:0 auto;padding:0 18px 50px}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:24px;margin-bottom:20px}
.card-label{font-size:13px;color:#8a7fa0;font-weight:600;margin-bottom:14px}
.tabs{display:flex;justify-content:center;margin-bottom:26px}
.tab-btn{padding:9px 26px;border:1px solid #3a2d55;background:transparent;color:#a09ab0;font-size:14px;cursor:pointer;font-family:'Noto Serif TC',Georgia,serif;font-weight:600;transition:all .3s}
.tab-btn:first-child{border-radius:8px 0 0 8px}
.tab-btn:last-child{border-radius:0 8px 8px 0}
.tab-btn.active{background:linear-gradient(135deg,#2a1f45,#1e1535);color:#C9A96E;border-color:#C9A96E}
.input-field{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e8e0f0;padding:11px 14px;font-size:14px;font-family:'Noto Serif TC',Georgia,serif;outline:none;transition:border-color .3s}
.input-field:focus{border-color:#C9A96E}
.input-field::placeholder{color:#5a5070}
textarea.input-field{resize:vertical;min-height:110px;line-height:1.8}
select.input-field{cursor:pointer}
select option{background:#1a1028;color:#e8e0f0}
.search-footer{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.search-hint{font-size:11px;color:#5a5070}
.btn-search{background:rgba(201,169,110,.15);border:1px solid rgba(201,169,110,.3);color:#C9A96E;padding:9px 22px;border-radius:8px;cursor:pointer;font-family:'Noto Serif TC',Georgia,serif;font-weight:600;font-size:13px;transition:all .3s}
.btn-search:hover{background:rgba(201,169,110,.25)}
.btn-search:disabled{opacity:.5;cursor:not-allowed}
.error-msg{margin-top:10px;padding:9px 13px;background:rgba(200,50,50,.1);border:1px solid rgba(200,50,50,.2);border-radius:8px;color:#e88;font-size:12px}
.font-btn{padding:7px 14px;border-radius:8px;cursor:pointer;font-family:'Noto Serif TC',Georgia,serif;font-size:12px;font-weight:600;transition:all .2s;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:#a09ab0}
.font-btn.active{border-color:#C9A96E;background:rgba(201,169,110,.15);color:#C9A96E}
.theme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:10px}
.theme-card{border:2px solid transparent;border-radius:10px;padding:9px;cursor:pointer;transition:all .3s;text-align:center;background:rgba(255,255,255,.02)}
.theme-card:hover{transform:translateY(-2px)}
.theme-card.active{border-color:#C9A96E;box-shadow:0 0 14px rgba(201,169,110,.2);background:rgba(255,255,255,.05)}
.theme-preview{width:100%;height:38px;border-radius:6px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.theme-name{font-size:12px;font-weight:700;color:#c0b8d0}
.theme-card.active .theme-name{color:#C9A96E}
.theme-desc{font-size:10px;color:#6a5f80}
.slide-preview{border-radius:10px;aspect-ratio:16/9;padding:5% 7%;display:flex;flex-direction:column;position:relative;overflow:hidden;margin-bottom:14px}
.slide-preview:last-child{margin-bottom:0}
.slide-line{position:absolute;left:7%;right:7%;height:1px;opacity:.3}
.slide-title-text{position:absolute;top:9%;left:7%;right:7%;text-align:left;font-weight:700;letter-spacing:1px}
.slide-body{line-height:1.15;text-align:left;padding:0;margin-top:22%;flex:1;overflow:hidden}
.btn-generate{background:linear-gradient(135deg,#C9A96E,#A67C3D);color:#0F0A1A;border:none;padding:13px 36px;font-size:16px;font-weight:700;border-radius:8px;cursor:pointer;font-family:'Noto Serif TC',Georgia,serif;letter-spacing:2px;transition:all .3s;display:inline-block}
.btn-generate:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 25px rgba(201,169,110,.35)}
.btn-generate:disabled{opacity:.5;cursor:not-allowed}
.center-area{text-align:center;margin-top:8px}
.center-hint{color:#5a5070;font-size:11px;margin-top:8px}
.fade-in{animation:fadeIn .4s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="header">
  <div class="sub">✦ BIBLE VERSE SLIDE GENERATOR ✦</div>
  <h1>聖經經文投影片</h1>
  <p>輸入經文，一鍵生成精美 PowerPoint 投影片</p>
</div>
<div class="container">
  <div id="fileWarning" style="display:none;background:rgba(200,160,50,0.15);border:1px solid rgba(200,160,50,0.3);border-radius:10px;padding:16px;margin-bottom:20px;font-size:13px;color:#e8c86a;line-height:1.6">
    <b>⚠ 偵測到本機檔案模式</b><br>
    您的瀏覽器可能會阻擋經文查詢功能。解決方法：<br>
    ① 將此檔案上傳到網路（如 <a href="https://app.netlify.com/drop" target="_blank" style="color:#C9A96E">Netlify Drop</a>），用網址開啟<br>
    ② 或使用「手動輸入」模式，直接貼上經文
  </div>
  <div class="tabs">
    <button class="tab-btn" onclick="switchMode('manual')">手動輸入</button>
    <button class="tab-btn active" onclick="switchMode('search')">經文查詢</button>
  </div>
  <div id="searchPanel" class="card fade-in">
    <div class="card-label">選擇版本、書卷與章節</div>
    <div style="margin-bottom:12px">
      <div style="font-size:11px;color:#6a5f80;margin-bottom:4px">聖經版本</div>
      <select id="versionSelect" class="input-field" onchange="onVersionChange()"></select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 80px 80px 80px;gap:10px 10px;margin-bottom:14px">
      <div style="font-size:11px;color:#6a5f80">書卷</div>
      <div style="font-size:11px;color:#6a5f80;text-align:center">章</div>
      <div style="font-size:11px;color:#6a5f80;text-align:center">起始節</div>
      <div style="font-size:11px;color:#6a5f80;text-align:center">結束節</div>
      <select id="bookSelect" class="input-field" onchange="onBookChange()"></select>
      <select id="chapterSelect" class="input-field" style="text-align:center" onchange="onChapterChange()"></select>
      <select id="verseStartSelect" class="input-field" style="text-align:center" onchange="onVerseStartChange()"></select>
      <select id="verseEndSelect" class="input-field" style="text-align:center"></select>
    </div>
    <div class="search-footer">
      <span class="search-hint">首次查詢需載入資料</span>
      <button id="searchBtn" class="btn-search" onclick="fetchVerse()">查詢經文</button>
    </div>
    <div id="errorMsg" class="error-msg" style="display:none"></div>
  </div>
  <div id="manualPanel" class="card fade-in" style="display:none">
    <div class="card-label">經文內容</div>
    <input id="referenceInput" class="input-field" placeholder="經文出處，例如：約翰福音 3:16" style="margin-bottom:12px" oninput="updatePreview()">
    <textarea id="verseInput" class="input-field" placeholder="在此輸入或貼上經文內容⋯" rows="5" oninput="updatePreview()"></textarea>
  </div>
  <div class="card fade-in">
    <div style="margin-bottom:22px">
      <div class="card-label">經文字體大小</div>
      <div id="fontOptions" style="display:flex;flex-wrap:wrap;gap:8px"></div>
    </div>
    <div style="margin-bottom:22px">
      <div class="card-label">標題（經文出處）字體大小</div>
      <div id="titleFontOptions" style="display:flex;flex-wrap:wrap;gap:8px"></div>
    </div>
    <div>
      <div class="card-label">投影片主題</div>
      <div class="theme-grid" id="themeGrid"></div>
    </div>
  </div>
  <div id="previewCard" class="card fade-in" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="card-label" style="margin-bottom:0" id="previewLabel">預覽</div>
    </div>
    <div id="previewSlides"></div>
  </div>
  <div class="center-area">
    <button id="generateBtn" class="btn-generate" onclick="generatePPTX()" disabled>下載 PowerPoint 投影片</button>
    <div id="generateHint" class="center-hint">請先輸入經文出處與內容</div>
  </div>
</div>

<script>
/* ===== CONFIG ===== */
const THEMES=[
  {id:"classic",name:"經典白",desc:"教會投影",bg:"#FFFFFF",titleColor:"#6B4226",textColor:"#1A1A1A",accent:"#8B6914",pptBg:"FFFFFF",pptTitle:"6B4226",pptText:"1A1A1A",border:"1px solid #ddd"},
  {id:"dark-navy",name:"深邃藍",desc:"莊嚴典雅",bg:"#0F1B2D",titleColor:"#C9A96E",textColor:"#E8E0D0",accent:"#C9A96E",pptBg:"0F1B2D",pptTitle:"C9A96E",pptText:"E8E0D0"},
  {id:"parchment",name:"羊皮卷",desc:"溫暖古典",bg:"#F5ECD7",titleColor:"#5C3D2E",textColor:"#3E2723",accent:"#8D6E47",pptBg:"F5ECD7",pptTitle:"5C3D2E",pptText:"3E2723",border:"1px solid #d5c9a8"},
  {id:"royal",name:"皇家紫",desc:"尊貴氣質",bg:"#1A0A2E",titleColor:"#D4A853",textColor:"#E0D6F0",accent:"#D4A853",pptBg:"1A0A2E",pptTitle:"D4A853",pptText:"E0D6F0"},
  {id:"forest",name:"森林綠",desc:"平靜安穩",bg:"#0D2818",titleColor:"#A8C69F",textColor:"#DCE8D8",accent:"#6B8F5B",pptBg:"0D2818",pptTitle:"A8C69F",pptText:"DCE8D8"},
  {id:"sunset",name:"夕陽暖",desc:"溫馨柔和",bg:"#2D1B14",titleColor:"#E8A87C",textColor:"#F0E0D0",accent:"#C0734A",pptBg:"2D1B14",pptTitle:"E8A87C",pptText:"F0E0D0"},
];
const FONT_SIZES=[{l:"24pt（小）",v:24},{l:"28pt",v:28},{l:"32pt",v:32},{l:"36pt",v:36},{l:"40pt",v:40},{l:"44pt（大）",v:44},{l:"48pt（特大）",v:48}];
const TITLE_FONT_SIZES=[{l:"28pt",v:28},{l:"32pt",v:32},{l:"36pt",v:36},{l:"40pt",v:40}];

const VERSIONS=[
  {id:"cuv-t",name:"和合本（繁體中文）",lang:"zh-t",dataKey:"cuv",url:"https://cdn.jsdelivr.net/gh/thiagobodruk/bible@master/json/zh_cuv.json"},
  {id:"cuv-s",name:"和合本（簡體中文）",lang:"zh-s",dataKey:"cuv",url:"https://cdn.jsdelivr.net/gh/thiagobodruk/bible@master/json/zh_cuv.json"},
  {id:"KJV",name:"KJV (King James Version)",lang:"en",dataKey:"kjv",url:"https://cdn.jsdelivr.net/gh/thiagobodruk/bible@master/json/en_kjv.json"},
  {id:"BBE",name:"BBE (Bible in Basic English)",lang:"en",dataKey:"bbe",url:"https://cdn.jsdelivr.net/gh/thiagobodruk/bible@master/json/en_bbe.json"},
];

// 66 books: [traditional, simplified, english, url-slug, chapters]
const BOOKS=[
["創世記","创世记","Genesis","genesis",50],["出埃及記","出埃及记","Exodus","exodus",40],["利未記","利未记","Leviticus","leviticus",27],["民數記","民数记","Numbers","numbers",36],["申命記","申命记","Deuteronomy","deuteronomy",34],["約書亞記","约书亚记","Joshua","joshua",24],["士師記","士师记","Judges","judges",21],["路得記","路得记","Ruth","ruth",4],["撒母耳記上","撒母耳记上","1 Samuel","1-samuel",31],["撒母耳記下","撒母耳记下","2 Samuel","2-samuel",24],["列王紀上","列王纪上","1 Kings","1-kings",22],["列王紀下","列王纪下","2 Kings","2-kings",25],["歷代志上","历代志上","1 Chronicles","1-chronicles",29],["歷代志下","历代志下","2 Chronicles","2-chronicles",36],["以斯拉記","以斯拉记","Ezra","ezra",10],["尼希米記","尼希米记","Nehemiah","nehemiah",13],["以斯帖記","以斯帖记","Esther","esther",10],["約伯記","约伯记","Job","job",42],["詩篇","诗篇","Psalms","psalms",150],["箴言","箴言","Proverbs","proverbs",31],["傳道書","传道书","Ecclesiastes","ecclesiastes",12],["雅歌","雅歌","Song of Solomon","song-of-solomon",8],["以賽亞書","以赛亚书","Isaiah","isaiah",66],["耶利米書","耶利米书","Jeremiah","jeremiah",52],["耶利米哀歌","耶利米哀歌","Lamentations","lamentations",5],["以西結書","以西结书","Ezekiel","ezekiel",48],["但以理書","但以理书","Daniel","daniel",12],["何西阿書","何西阿书","Hosea","hosea",14],["約珥書","约珥书","Joel","joel",3],["阿摩司書","阿摩司书","Amos","amos",9],["俄巴底亞書","俄巴底亚书","Obadiah","obadiah",1],["約拿書","约拿书","Jonah","jonah",4],["彌迦書","弥迦书","Micah","micah",7],["那鴻書","那鸿书","Nahum","nahum",3],["哈巴谷書","哈巴谷书","Habakkuk","habakkuk",3],["西番雅書","西番雅书","Zephaniah","zephaniah",3],["哈該書","哈该书","Haggai","haggai",2],["撒迦利亞書","撒迦利亚书","Zechariah","zechariah",14],["瑪拉基書","玛拉基书","Malachi","malachi",4],["馬太福音","马太福音","Matthew","matthew",28],["馬可福音","马可福音","Mark","mark",16],["路加福音","路加福音","Luke","luke",24],["約翰福音","约翰福音","John","john",21],["使徒行傳","使徒行传","Acts","acts",28],["羅馬書","罗马书","Romans","romans",16],["哥林多前書","哥林多前书","1 Corinthians","1-corinthians",16],["哥林多後書","哥林多后书","2 Corinthians","2-corinthians",13],["加拉太書","加拉太书","Galatians","galatians",6],["以弗所書","以弗所书","Ephesians","ephesians",6],["腓立比書","腓立比书","Philippians","philippians",4],["歌羅西書","歌罗西书","Colossians","colossians",4],["帖撒羅尼迦前書","帖撒罗尼迦前书","1 Thessalonians","1-thessalonians",5],["帖撒羅尼迦後書","帖撒罗尼迦后书","2 Thessalonians","2-thessalonians",3],["提摩太前書","提摩太前书","1 Timothy","1-timothy",6],["提摩太後書","提摩太后书","2 Timothy","2-timothy",4],["提多書","提多书","Titus","titus",3],["腓利門書","腓利门书","Philemon","philemon",1],["希伯來書","希伯来书","Hebrews","hebrews",13],["雅各書","雅各书","James","james",5],["彼得前書","彼得前书","1 Peter","1-peter",5],["彼得後書","彼得后书","2 Peter","2-peter",3],["約翰一書","约翰一书","1 John","1-john",5],["約翰二書","约翰二书","2 John","2-john",1],["約翰三書","约翰三书","3 John","3-john",1],["猶大書","犹大书","Jude","jude",1],["啟示錄","启示录","Revelation","revelation",22]
];

let currentFontSize=40,currentTitleFontSize=32,currentThemeId="dark-navy",currentVersion="cuv-t";

function getBookName(idx){
  const v=VERSIONS.find(v=>v.id===currentVersion);
  if(v.lang==="zh-t")return BOOKS[idx][0];
  if(v.lang==="zh-s")return BOOKS[idx][1];
  return BOOKS[idx][2];
}

/* ===== T2S converter ===== */
const T2S_PAIRS="與与書书記记數数從从歷历國国導导傳传說说話话語语詩诗預预約约這这個个為为過过認认開开們们對对問问應应東东將将時时經经裏里長长門门間间關关頭头點点進进還还邊边麼么會会義义聖圣聲声處处號号見见讓让許许謝谢論论該该講讲讀读變变買买車车轉转軍军隨随電电離离馬马當当發发祂祂裡里實实種种稱称總总華华萬万葉叶選选遠远運运連连達达鄰邻雖虽雲云養养聯联禱祷後后兒儿眾众卻却須须屬属學学層层豐丰質质類类題题體体點点釘钉軟软輕轻載载鬧闹獅狮壓压辦办歸归歡欢歎叹環环瑪玛葡葡園园堅坚執执場场報报壁壁夢梦奪夺婦妇嬰婴寧宁審审寶宝導导崇崇嶺岭廟庙應应懶懒慣惯戰战損损撒撒擊击擁拥擴扩攻攻權权條条極极標标樓楼歌歌殘残毀毁污污漁渔潔洁災灾營营獻献獸兽瓦瓦瞎瞎網网罪罪聚聚脫脱腐腐般般蒙蒙蛇蛇術术衛卫裂裂覺觉討讨証证詞词詳详誇夸誡诫課课諸诸謀谋譯译識识議议護护貝贝貧贫貪贪賊贼賞赏贖赎路路較较辨辨農农遣遣避避釋释鄉乡錢钱鍊链鎖锁鏈链鑰钥閃闪閉闭闡阐陣阵陰阴陸陆隊队隱隐雕雕震震響响領领顧顾餘余駱骆驅驱驟骤鬥斗鬼鬼魂魂魔魔齋斋齒齿塵尘獎奖壘垒穌稣藝艺業业飢饥飛飞飯饭餅饼養养禮礼壞坏敵敌僕仆態态勸劝雙双難难風风飄飘騎骑鑄铸鏡镜險险頸颈寫写結结給给職职範范臨临殺杀統统詢询魚鱼鳥鸟麥麦齊齐壇坛師师廣广獄狱願愿獨独練练節节歲岁幾几斷断築筑線线燈灯滿满漸渐殿殿瑪玛親亲觀观計计裝装聯联聯联聽听財财賜赐";
const _t2sMap=new Map();for(let i=0;i<T2S_PAIRS.length;i+=2)_t2sMap.set(T2S_PAIRS[i],T2S_PAIRS[i+1]);
function t2s(text){return[...text].map(c=>_t2sMap.get(c)||c).join("")}

/* ===== CRC-32 & ZIP ===== */
const crcT=(()=>{const t=new Uint32Array(256);for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c}return t})();
function crc32(buf){let c=0xFFFFFFFF;for(let i=0;i<buf.length;i++)c=crcT[(c^buf[i])&0xFF]^(c>>>8);return(c^0xFFFFFFFF)>>>0}
class MiniZip{
  constructor(){this.files=[]}

/* ===== TEXT SPLITTING ===== */
function slideLimits(fs){
  // Body area: 8.5" wide x 3.75" tall at single spacing
  // Use conservative safety factor so text never reaches the bottom decorative line
  const cw=fs/72;
  const charsPerLine=Math.floor(8.5/cw);
  const lineH=fs/72;
  const linesPerSlide=Math.floor(3.75/lineH*0.82); // leave ~18% bottom breathing room
  return{charsPerLine,linesPerSlide};
}

// Count lines a piece of text takes when wrapped (each \n is a hard break too)
function linesNeeded(text,charsPerLine){
  if(!text)return 0;
  let lines=0;
  for(const para of text.split("\n")){
    lines+=Math.max(1,Math.ceil(para.length/charsPerLine));
  }
  return lines;
}

function splitText(text,fs){
  const{charsPerLine,linesPerSlide}=slideLimits(fs);
  // Detect verses by number + space pattern (preceded by non-digit)
  const versePattern=/(?<![0-9])(?=\d+ )/g;
  const verses=text.split(versePattern).map(s=>s.trim()).filter(s=>s);

  if(verses.length>1){
    // Each verse gets its own "block"; each block starts on a new line.
    const slides=[];
    let curText="";
    let curLines=0;
    for(const v of verses){
      const vLines=linesNeeded(v,charsPerLine);
      // If verse alone exceeds slide capacity, it's unavoidable - place on its own slide and let it overflow/split
      if(vLines>linesPerSlide){
        if(curText){slides.push(curText);curText="";curLines=0}
        // Split long verse by punctuation
        const parts=[];
        const sents=v.split(/(?<=[。！？；.\n])/);
        let c="",cL=0;
        for(const s of sents){
          const sL=linesNeeded(s,charsPerLine);
          if(cL+sL>linesPerSlide&&c){parts.push(c.trim());c=s;cL=sL}
          else{c+=s;cL+=sL}
        }
        if(c.trim())parts.push(c.trim());
        slides.push(...parts);
        continue;
      }
      // Normal case: check if this verse fits on current slide
      if(curLines+vLines>linesPerSlide&&curText){
        // Doesn't fit - push current slide, start new one with this verse
        slides.push(curText);
        curText=v;
        curLines=vLines;
      }else{
        curText=curText?curText+v:v;
        curLines+=vLines;
      }
    }
    if(curText)slides.push(curText);
    return slides;
  }

  // No verse numbers: split by punctuation using line-based logic
  const sents=text.split(/(?<=[。！？；.\n])/);
  const slides=[];let cur="",curL=0;
  for(const s of sents){
    const sL=linesNeeded(s,charsPerLine);
    if(curL+sL>linesPerSlide&&cur){slides.push(cur.trim());cur=s;curL=sL}
    else{cur+=s;curL+=sL}
  }
  if(cur.trim())slides.push(cur.trim());
  // Hard split any slide still too long
  const res=[];
  const maxChars=charsPerLine*linesPerSlide;
  for(const sl of slides){
    if(sl.length<=maxChars)res.push(sl);
    else for(let i=0;i<sl.length;i+=maxChars)res.push(sl.slice(i,i+maxChars));
  }
  return res;
}

const bibleCache={};

async function loadFullBible(dataKey,url){
  if(bibleCache[dataKey])return bibleCache[dataKey];
  const r=await fetch(url);
  if(!r.ok)throw new Error("無法載入聖經資料");
  bibleCache[dataKey]=await r.json();
  return bibleCache[dataKey];
}

async function getChapterVerses(versionId,bookIdx,chapter){
  const v=VERSIONS.find(v=>v.id===versionId);
  const bible=await loadFullBible(v.dataKey,v.url);
  return bible[bookIdx].chapters[chapter-1];
}

async function getVerseCount(bookIdx,chapter){
  const verses=await getChapterVerses(currentVersion,bookIdx,chapter);
  return verses.length;
}

/* ===== CASCADE DROPDOWNS ===== */
function fillSelect(sel,count,startFrom){sel.innerHTML="";for(let i=startFrom||1;i<=count;i++){const o=document.createElement("option");o.value=i;o.textContent=i;sel.appendChild(o)}}

function populateBooks(){
  const sel=document.getElementById("bookSelect");
  sel.innerHTML="";
  BOOKS.forEach((b,i)=>{
    const o=document.createElement("option");o.value=i;o.textContent=getBookName(i);
    if(i===42)o.selected=true; // 約翰福音
    sel.appendChild(o);
  });
}

async function onVersionChange(){
  currentVersion=document.getElementById("versionSelect").value;
  populateBooks();
  const v=VERSIONS.find(v=>v.id===currentVersion);
  try{await loadFullBible(v.dataKey,v.url)}catch(e){}
  await onBookChange();
}

async function onBookChange(){
  const err=document.getElementById("errorMsg");err.style.display="none";
  const bookIdx=parseInt(document.getElementById("bookSelect").value);
  const chapters=BOOKS[bookIdx][4]; // hardcoded, always available
  fillSelect(document.getElementById("chapterSelect"),chapters);
  await onChapterChange();
}

async function onChapterChange(){
  const err=document.getElementById("errorMsg");err.style.display="none";
  const bookIdx=parseInt(document.getElementById("bookSelect").value);
  const ch=parseInt(document.getElementById("chapterSelect").value);
  const v=VERSIONS.find(v=>v.id===currentVersion);
  // Try to get exact verse count from loaded data
  if(bibleCache[v.dataKey]){
    try{
      const count=bibleCache[v.dataKey][bookIdx].chapters[ch-1].length;
      fillSelect(document.getElementById("verseStartSelect"),count);
      onVerseStartChange_sync(count);
      return;
    }catch(e){}
  }
  // Data not loaded yet: try loading, fallback to 50
  try{
    const count=await getVerseCount(bookIdx,ch);
    fillSelect(document.getElementById("verseStartSelect"),count);
    onVerseStartChange_sync(count);
  }catch(e){
    fillSelect(document.getElementById("verseStartSelect"),50);
    onVerseStartChange_sync(50);
  }
}

function onVerseStartChange(){
  const bookIdx=parseInt(document.getElementById("bookSelect").value);
  const ch=parseInt(document.getElementById("chapterSelect").value);
  const v=VERSIONS.find(v=>v.id===currentVersion);
  let total=30;
  if(bibleCache[v.dataKey]){
    total=bibleCache[v.dataKey][bookIdx].chapters[ch-1].length;
  }
  onVerseStartChange_sync(total);
}

function onVerseStartChange_sync(totalV){
  const vs=parseInt(document.getElementById("verseStartSelect").value);
  const sel=document.getElementById("verseEndSelect");
  sel.innerHTML="";
  const dash=document.createElement("option");dash.value="-";dash.textContent="-";sel.appendChild(dash);
  for(let i=vs+1;i<=totalV;i++){const o=document.createElement("option");o.value=i;o.textContent=i;sel.appendChild(o)}
}

/* ===== FETCH VERSE ===== */
async function fetchVerse(){
  const bookIdx=parseInt(document.getElementById("bookSelect").value);
  const ch=parseInt(document.getElementById("chapterSelect").value);
  const vs=parseInt(document.getElementById("verseStartSelect").value);
  const veVal=document.getElementById("verseEndSelect").value;
  const ve=veVal==="-"?0:parseInt(veVal);
  const err=document.getElementById("errorMsg");
  err.style.display="none";
  const bookName=getBookName(bookIdx);
  const disp=ve?`${bookName} ${ch}:${vs}-${ve}`:`${bookName} ${ch}:${vs}`;
  const btn=document.getElementById("searchBtn");btn.disabled=true;btn.textContent="載入中⋯";
  try{
    const v=VERSIONS.find(v=>v.id===currentVersion);
    const endV=ve||vs;
    const chData=await getChapterVerses(currentVersion,bookIdx,ch);
    if(vs<1||endV>chData.length)throw new Error(`節數超出範圍（本章共 ${chData.length} 節）`);
    let parts=[];
    for(let i=vs;i<=endV;i++){
      let txt=(chData[i-1]||"").replace(/ /g," ").trim();
      if(v.lang==="zh-t")txt=txt.replace(/ /g,"");
      if(v.lang==="zh-s")txt=t2s(txt.replace(/ /g,""));
      parts.push(`${i} ${txt}`);
    }
    const text=parts.join(v.lang==="en"?" ":"");
    document.getElementById("referenceInput").value=disp;
    document.getElementById("verseInput").value=text.trim();
    switchMode("manual");updatePreview();
  }catch(e){
    let msg=e.message;
    if(window.location.protocol==="file:")msg+="（本機檔案模式下，瀏覽器可能阻擋網路請求。請將檔案上傳到網路後使用，或改用手動輸入。）";
    err.textContent=msg;err.style.display="block";
  }
  btn.disabled=false;btn.textContent="查詢經文";
}

/* ===== UI ===== */
function switchMode(m){
  document.querySelectorAll(".tab-btn").forEach((b,i)=>b.classList.toggle("active",(i===0&&m==="manual")||(i===1&&m==="search")));
  document.getElementById("searchPanel").style.display=m==="search"?"block":"none";
  document.getElementById("manualPanel").style.display=m==="manual"?"block":"none";
}
function selectFontSize(v){currentFontSize=v;document.querySelectorAll(".font-btn:not(.title-font-btn)").forEach(b=>b.classList.toggle("active",+b.dataset.value===v));updatePreview()}
function selectTitleFontSize(v){currentTitleFontSize=v;document.querySelectorAll(".title-font-btn").forEach(b=>b.classList.toggle("active",+b.dataset.value===v));updatePreview()}
function selectTheme(id){currentThemeId=id;document.querySelectorAll(".theme-card").forEach(c=>c.classList.toggle("active",c.dataset.id===id));updatePreview()}
function getTheme(){return THEMES.find(t=>t.id===currentThemeId)}

function updatePreview(){
  const ref=document.getElementById("referenceInput").value.trim();
  const text=document.getElementById("verseInput").value.trim();
  const pc=document.getElementById("previewCard"),ps=document.getElementById("previewSlides");
  const btn=document.getElementById("generateBtn"),hint=document.getElementById("generateHint");
  const ok=ref&&text;btn.disabled=!ok;hint.textContent=ok?"":"請先輸入經文出處與內容";
  if(!ok){pc.style.display="none";return}
  const slides=splitText(text,currentFontSize),theme=getTheme(),tot=slides.length;
  document.getElementById("previewLabel").textContent=`預覽（共 ${tot} 張投影片）`;
  pc.style.display="block";
  ps.innerHTML=slides.map((st,i)=>{
    const title=ref;
    const fs=`clamp(11px,${currentFontSize/3.2}vw,${currentFontSize*0.5}px)`;
    const tfs=`clamp(10px,${currentTitleFontSize/4}vw,${currentTitleFontSize*0.5}px)`;
    return`<div class="slide-preview" style="background:${theme.bg};${theme.border||''}">
      <div class="slide-line" style="top:7%;background:${theme.accent}"></div>
      <div class="slide-title-text" style="color:${theme.titleColor};font-size:${tfs}">${title}</div>
      <div class="slide-body" style="color:${theme.textColor};font-size:${fs}">${st}</div>
      <div class="slide-line" style="bottom:5%;background:${theme.accent}"></div>
    </div>`}).join("");
}

/* ===== GENERATE ===== */
function generatePPTX(){
  const ref=document.getElementById("referenceInput").value.trim();
  const text=document.getElementById("verseInput").value.trim();
  if(!ref||!text)return;
  const btn=document.getElementById("generateBtn");btn.disabled=true;btn.textContent="生成中⋯";
  try{
    const slides=splitText(text,currentFontSize),theme=getTheme(),tot=slides.length;
    const zip=new MiniZip();
    zip.add("[Content_Types].xml",contentTypes(tot));
    zip.add("_rels/.rels",rootRels);
    zip.add("docProps/core.xml",coreXml);
    zip.add("docProps/app.xml",appXml(tot));
    const p=makePres(tot);
    zip.add("ppt/presentation.xml",p.xml);
    zip.add("ppt/_rels/presentation.xml.rels",p.rels);
    zip.add("ppt/presProps.xml",presPropsXml);
    zip.add("ppt/viewProps.xml",viewPropsXml);
    zip.add("ppt/tableStyles.xml",tableStylesXml);
    zip.add("ppt/theme/theme1.xml",theme1);
    zip.add("ppt/slideMasters/slideMaster1.xml",sldMaster);
    zip.add("ppt/slideMasters/_rels/slideMaster1.xml.rels",sldMasterRels);
    zip.add("ppt/slideLayouts/slideLayout1.xml",sldLayout);
    zip.add("ppt/slideLayouts/_rels/slideLayout1.xml.rels",sldLayoutRels);
    slides.forEach((st,i)=>{
      const title=ref;
      zip.add(`ppt/slides/slide${i+1}.xml`,makeSlide(theme.pptBg,title,st,currentFontSize,currentTitleFontSize,theme.pptTitle,theme.pptText));
      zip.add(`ppt/slides/_rels/slide${i+1}.xml.rels`,slideRels);
    });
    const blob=new Blob([zip.build()],{type:"application/vnd.openxmlformats-officedocument.presentationml.presentation"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${ref}.pptx`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  }catch(e){alert("產生投影片時發生錯誤："+e.message)}
  btn.disabled=false;btn.textContent="下載 PowerPoint 投影片";
}

/* ===== INIT ===== */
(async function(){
  // Detect file:// protocol and show warning
  if(window.location.protocol==="file:"){
    document.getElementById("fileWarning").style.display="block";
  }
  // Version selector
  const vs=document.getElementById("versionSelect");
  VERSIONS.forEach(v=>{const o=document.createElement("option");o.value=v.id;o.textContent=v.name;if(v.id==="cuv-t")o.selected=true;vs.appendChild(o)});
  // Book list
  populateBooks();
  // Font sizes
  const fc=document.getElementById("fontOptions");
  FONT_SIZES.forEach(f=>{const b=document.createElement("button");b.className="font-btn"+(f.v===currentFontSize?" active":"");b.textContent=f.l;b.dataset.value=f.v;b.onclick=()=>selectFontSize(f.v);fc.appendChild(b)});
  const tfc=document.getElementById("titleFontOptions");
  TITLE_FONT_SIZES.forEach(f=>{const b=document.createElement("button");b.className="font-btn title-font-btn"+(f.v===currentTitleFontSize?" active":"");b.textContent=f.l;b.dataset.value=f.v;b.onclick=()=>selectTitleFontSize(f.v);tfc.appendChild(b)});
  // Themes
  const tc=document.getElementById("themeGrid");
  THEMES.forEach(t=>{const c=document.createElement("div");c.className="theme-card"+(t.id===currentThemeId?" active":"");c.dataset.id=t.id;c.onclick=()=>selectTheme(t.id);c.innerHTML=`<div class="theme-preview" style="background:${t.bg};color:${t.titleColor};${t.border||''}">\u7D93\u6587</div><div class="theme-name">${t.name}</div><div class="theme-desc">${t.desc}</div>`;tc.appendChild(c)});
  // Always populate chapter/verse dropdowns first (using hardcoded chapter counts)
  await onBookChange();
  // Then try loading bible data in background to get exact verse counts
  try{
    await loadFullBible("cuv","https://cdn.jsdelivr.net/gh/thiagobodruk/bible@master/json/zh_cuv.json");
    // Refresh verse counts now that data is loaded
    await onChapterChange();
  }catch(e){
    document.getElementById("errorMsg").textContent=window.location.protocol==="file:"?"本機檔案模式下無法自動載入經文資料。請將此檔案上傳到網路使用，或改用「手動輸入」模式。":"聖經資料載入中，請稍候再按查詢經文（或檢查網路連線）";
    document.getElementById("errorMsg").style.display="block";
    // Retry after 3 seconds
    setTimeout(async()=>{
      try{
        await loadFullBible("cuv","https://cdn.jsdelivr.net/gh/thiagobodruk/bible@master/json/zh_cuv.json");
        document.getElementById("errorMsg").style.display="none";
        await onChapterChange();
      }catch(e2){}
    },3000);
  }
})();
</script>
